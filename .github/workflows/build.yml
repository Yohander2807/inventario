name: Build Flet APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build APK
        run: |
          # 1. Aceptar licencias de Android SDK (evita que el build se detenga)
          yes | flutter doctor --android-licenses || true
          
          # 2. Inyectar 'y' para la descarga automática del SDK de Flutter 3.41.4+
          # Usamos '.' para buscar el main.py en la raíz del proyecto
          printf 'y\n' | flet build apk . --project "SOPSoft-Inventario"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Sistema-Inventario-APK
          path: build/apk/*.apk