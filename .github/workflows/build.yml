name: Build SOPSoft ERP APK
on:
  push:
    branches:
      - main  # Se ejecuta cuando subes cambios a la rama main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Versión estable para Flet

      - name: Instalar Flet y dependencias
        run: |
          pip install flet
          # Si usas más librerias (como requests), agrégalas aquí:
          # pip install requests 

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2' # Versión recomendada para Flet 0.27+
          channel: 'stable'

      - name: Compilar APK con Flet
        run: |
          # El comando genera el APK en la carpeta build/apk
          flet build apk --project "SOPSoft ERP" --org com.yohander.sopsoft

      - name: Subir APK como Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: SOPSoft-Release-APK
          path: build/apk/*.apk