name: Build SOPSoft ERP APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Flet y dependencias
        run: |
          python -m pip install --upgrade pip
          pip install flet
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Aceptar Licencias de Android
        run: |
          # Acepta todas las licencias del SDK para evitar el error de compilación
          yes | sdkmanager --licenses || true

      - name: Compilar APK con Flet
        run: |
          # IMPORTANTE: 
          # --build-number 2: Indica que es una actualización de la versión anterior.
          # -y: Acepta automáticamente las licencias dentro del comando flet.
          flet build apk \
            --project "SOPSoft ERP" \
            --org "com.yohander.sopsoft" \
            --build-number 2 \
            --build-version "1.1.0" \
            -y

      - name: Subir APK como Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: SOPSoft-ERP-Update-v1.1.0
          path: build/apk/*.apk