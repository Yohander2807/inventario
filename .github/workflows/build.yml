name: Build SOPSoft ERP APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Flet y dependencias
        run: |
          python -m pip install --upgrade pip
          pip install flet
          # Instala dependencias adicionales si existe el archivo
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0' # Versión estable recomendada para Flet
          channel: 'stable'

      - name: Compilar APK con Flet
        run: |
          # IMPORTANTE: 
          # --build-number debe ser mayor al de la APK anterior (ej: 2)
          # --build-version es la versión visual (ej: 1.1.0)
          # --org debe ser el mismo que usaste originalmente
          yes | flet build apk \
            --project "SOPSoft ERP" \
            --org "com.yohander.sopsoft" \
            --build-number 2 \
            --build-version "1.1.0"

      - name: Subir APK como Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: SOPSoft-Release-v1.1.0
          path: build/apk/*.apk