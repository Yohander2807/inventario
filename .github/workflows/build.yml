name: Build SOPSoft ERP APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Flet y dependencias
        run: |
          python -m pip install --upgrade pip
          # Instalamos la versión más reciente disponible (0.84.0)
          pip install flet
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          # Usamos la versión de Flutter que tu log anterior pedía
          flutter-version: '3.41.4' 
          channel: 'stable'

      - name: Aceptar Licencias de Android
        run: |
          # Esto soluciona el problema de las licencias desde la raíz del SDK
          yes | sdkmanager --licenses || true

      - name: Compilar APK con Flet
        run: |
          # En la versión 0.84.0, eliminamos el flag '-y' que daba error.
          # Usamos 'yes |' para confirmar cualquier pregunta interna.
          yes | flet build apk \
            --project "SOPSoft ERP" \
            --org "com.yohander.sopsoft" \
            --build-number 2 \
            --build-version "1.1.0"

      - name: Subir APK como Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: SOPSoft-ERP-v1.1.0
          path: build/apk/*.apk